services:
  postgres:
    image: postgres:17-alpine
    container_name: pokedex_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pokedex
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pokedex"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
