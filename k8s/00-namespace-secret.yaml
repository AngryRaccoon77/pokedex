apiVersion: v1
kind: Namespace
metadata:
  name: pokedex
---
# Для курсача креды лежат прямо в манифесте. В реальном проекте — External Secrets / Sealed Secrets / Vault.
# Ключи совпадают с переменными окружения официального образа postgres
# (POSTGRES_*) и переиспользуются приложением через PG_USER/PG_PASSWORD/PG_DATABASE.
apiVersion: v1
kind: Secret
metadata:
  name: pokedex-db
  namespace: pokedex
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: pokedex
